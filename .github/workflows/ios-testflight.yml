name: iOS → TestFlight

# YT-99. Builds the iOS Xcode project (GameCI, on Linux — Unity only emits the
# project, it doesn't compile the app) and ships a signed build to TestFlight via
# Fastlane on a macOS runner. Kept SEPARATE from build.yml so the WebGL deploy is
# untouched, and gated so the expensive macOS minutes never run on a normal push.
#
# Triggers: manual (Actions → Run workflow) or pushing a version tag `vX.Y.Z`.
# All Apple credentials come from GitHub Actions secrets — see APPLE_SIGNING_SETUP.md.

on:
  workflow_dispatch:
    inputs:
      dev_tools:
        description: 'Include the dev tuning panel (YT-118). Leave ON for TestFlight; turn OFF for an App Store submission build.'
        type: boolean
        default: true
  push:
    tags: ['v*']

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build the iOS Xcode project with GameCI. Runs on Linux (cheap) — Unity
  #    produces build/iOS/iOS/Unity-iPhone.xcodeproj; it does not sign anything.
  # ---------------------------------------------------------------------------
  build-ios:
    name: Build iOS Xcode project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/cache@v4
        with:
          path: Library
          # iOS-specific key so it never collides with the WebGL job's Library cache.
          key: Library-iOS-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-iOS-
            Library-
      # YT-118. Everything this workflow produces goes to TestFlight, which is a BETA
      # channel, so the tuning panel is in by default and Lee can dial the combat-feel
      # numbers on the device he actually plays on. Turn the dev_tools input off for an
      # App Store submission build and the define is simply never added — the committed
      # settings carry no define, so shipping without the panel is what happens by
      # default rather than something anyone has to remember.
      #
      # Note this only lets the PANEL in. The cheats (invincible, infinite energy) stay
      # behind DevMode.Enabled, which no iOS build can turn on — otherwise Lee would be
      # tuning "life" and "water rates" in a build where neither could run out.
      - name: Compile the dev tuning panel in (beta builds only)
        if: github.event_name != 'workflow_dispatch' || inputs.dev_tools
        run: python3 scripts/enable-dev-tools-define.py

      - name: Build iOS target (GameCI)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: auto # reads ProjectSettings/ProjectVersion.txt
          targetPlatform: iOS
      # Tar the project before uploading. actions/upload-artifact does NOT preserve
      # the executable bit, and Unity's generated project ships tools that must stay
      # executable (process_symbols.sh, usymtoolarm64, MapFileParser.sh, ...) or the
      # macOS archive fails with "Permission denied" in a build-phase script. A tar
      # round-trip keeps the modes, which fixes the whole class rather than chmod'ing
      # each file we happen to trip over.
      - name: Package the Xcode project (tar preserves file modes)
        run: tar -cf ios-build.tar -C build/iOS .
      - uses: actions/upload-artifact@v4
        with:
          name: build-iOS
          path: ios-build.tar
          retention-days: 3

  # ---------------------------------------------------------------------------
  # 2. Sign the Xcode project + upload to TestFlight. macOS only. Preflight is the
  #    FIRST step: with the Apple secrets absent it fails fast with a clear message,
  #    so the pipeline is green up to exactly the point that needs Lee's credentials.
  # ---------------------------------------------------------------------------
  release-ios:
    name: Sign & upload to TestFlight
    needs: build-ios
    runs-on: macos-15
    env:
      IOS_BUILD_PATH: ${{ github.workspace }}/build/iOS
      # Apple credentials (all from secrets — empty until Lee configures them).
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_P8_BASE64 }}
      IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
      IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
    steps:
      - name: Preflight — verify Apple secrets are configured
        shell: bash
        run: |
          required=(
            APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_P8_BASE64
            IOS_DIST_CERT_P12_BASE64 IOS_DIST_CERT_PASSWORD
            IOS_PROVISIONING_PROFILE_BASE64 IOS_PROVISIONING_PROFILE_NAME
            APPLE_TEAM_ID IOS_BUNDLE_ID
          )
          missing=()
          for name in "${required[@]}"; do
            [ -z "${!name}" ] && missing+=("$name")
          done
          if [ ${#missing[@]} -gt 0 ]; then
            printf '::error::Missing required Apple secret(s): %s\n' "${missing[*]}"
            echo "::error::Add them in Settings → Secrets and variables → Actions. See APPLE_SIGNING_SETUP.md for how to obtain each value."
            {
              echo "### ❌ iOS release blocked — missing GitHub secrets"
              echo ""
              echo "The iOS build succeeded, but signing/upload needs these secrets, which are not set:"
              echo ""
              for name in "${missing[@]}"; do echo "- \`$name\`"; done
              echo ""
              echo "Follow **APPLE_SIGNING_SETUP.md** in the repo to generate each value, then re-run this workflow."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "All required Apple secrets are present."

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build-iOS
          path: ${{ runner.temp }}/ios-artifact

      - name: Unpack the Xcode project
        shell: bash
        run: |
          mkdir -p build/iOS
          tar -xf "$RUNNER_TEMP/ios-artifact/ios-build.tar" -C build/iOS

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Ensure iOS platform SDK
        run: xcodebuild -downloadPlatform iOS || true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Decode signing assets
        shell: bash
        run: |
          echo "$IOS_DIST_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"

      - name: Fastlane — sign & upload to TestFlight
        working-directory: ${{ github.workspace }}
        run: bundle exec fastlane ios beta

      # xcbeautify swallows the stderr of failing run-script phases, so an archive
      # failure otherwise shows only "PhaseScriptExecution ... failed" with no
      # reason. Surface the raw gym log and the generated script on failure.
      - name: Diagnose archive failure
        if: failure()
        shell: bash
        run: |
          echo "::group::gym log (last 200 lines)"
          tail -n 200 ~/Library/Logs/gym/*.log 2>/dev/null || echo "no gym log"
          echo "::endgroup::"
          echo "::group::failing run-script phases"
          find ~/Library/Developer/Xcode/DerivedData -name 'Script-*.sh' 2>/dev/null | while read -r f; do
            echo "--- $f"
            cat "$f"
          done || true
          echo "::endgroup::"
